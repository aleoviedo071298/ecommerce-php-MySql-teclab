<!DOCTYPE html>

<body>
    <div class="contenedor">
        <h1 id="titulo">Agregar Categoría</h1>
        <form id="form_categorias" action="../categorias.php" method="post" enctype="multipart/form-data">

            </div>
            <h2 class="author">Alejandro Oviedo</h2>
        </form>
    </div>
