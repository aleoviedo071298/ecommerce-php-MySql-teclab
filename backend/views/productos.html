<!DOCTYPE html>
<html>

<head>
    <title>Agregar Producto</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../../assets/css/estilos.css">
</head>

<header class="topbar">
    <img src="../../assets/img/teclab.png" alt="Teclab" class="logo" />
</header>

<body>
    <div class="contenedor">

        <h1 id="titulo">Agregar Producto</h1>
        <form id="form_productos" action="../productos.php" method="post" enctype="multipart/form-data">
            <label for="nombre">Nombre del Producto</label>
            <input type="text" id="nombre" name="nombre">

            <label for="imagen">Imagen</label>
            <input type="file" id="imagen" name="imagen">

            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion"></textarea>

            <label for="categoria">Categoría</label>
            <input type="number" id="categoria" name="categoria">

            <label for="precio">Precio</label>
            <input type="number" id="precio" name="precio">

            <div class="btn-group">
                <button type="button" class="btn-cancelar" id="boton_cancelar"
                    onclick="window.location.href='lista_productos.html'">Cancelar</button>
                <button type="submit" class="btn-guardar" id="boton_guardar">Guardar</button>
            </div>
            <h2 class="author">Alejandro Oviedo</h2>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="../../assets/js/validaciones.js" type="text/javascript"></script>
</body>

</html>
